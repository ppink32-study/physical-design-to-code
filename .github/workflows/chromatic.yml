# Chromatic 에 Storybook 을 게시합니다.
# 사용 전: GitHub 저장소 Settings → Secrets and variables → Actions 에서
# CHROMATIC_PROJECT_TOKEN 을 추가하세요. (https://www.chromatic.com/ 프로젝트 설정에서 발급)
#
# Storybook 소스는 my-app. 서브디렉토리에 있어 working-directory 로 지정합니다.

name: Chromatic

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: chromatic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chromatic:
    name: Publish to Chromatic
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: my-app./package-lock.json

      - name: Install dependencies
        working-directory: ./my-app.
        run: npm ci

      - name: Publish to Chromatic
        uses: chromaui/action@v16
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          buildScriptName: build-storybook
          exitZeroOnChanges: true
          workingDir: my-app.
